name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: gradle/gradle-build-action@v2

      - name: Build web app
        run: ./gradlew wasmJsBrowserDistribution --stacktrace

      - name: Fix base path for GitHub Pages
        run: |
          sed -i 's|<head>|<head><base href="/SlitherLink/">|' build/wasm/packages/SlitherLink-composeApp/kotlin/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/wasm/packages/SlitherLink-composeApp/kotlin


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/deploy-pages@v4
